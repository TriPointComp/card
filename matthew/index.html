<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Matthew Watson | TriPoint Compliance</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0d1526; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card-wrapper { width: 100%; max-width: 420px; }
    .card { background: linear-gradient(145deg, #1a2744 0%, #0d1526 60%, #1a2744 100%); border-radius: 24px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(180,190,220,0.08); position: relative; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #8a9bc4, #c0cadc, #8a9bc4, transparent); }
    .card-top { padding: 36px 36px 24px; }
    .logo-area { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
    .logo-img { width: 72px; height: 72px; object-fit: contain; flex-shrink: 0; }
    .divider-line { width: 1px; height: 48px; background: linear-gradient(180deg, transparent, rgba(180,190,220,0.3), transparent); flex-shrink: 0; }
    .company-name { color: #ffffff; font-size: 11.5px; font-weight: 600; letter-spacing: 0.11em; text-transform: uppercase; line-height: 1.55; opacity: 0.8; }
    .name { font-size: 32px; font-weight: 700; color: #ffffff; letter-spacing: -0.02em; line-height: 1.1; }
    .title { font-size: 13px; font-weight: 500; color: #8a9bc4; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 8px; }
    .silver-rule { width: 48px; height: 2px; background: linear-gradient(90deg, #8a9bc4, #c0cadc); border-radius: 2px; margin: 20px 0; }
    .contact-grid { display: flex; flex-direction: column; gap: 14px; }
    .contact-item { display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; transition: opacity 0.2s; }
    .contact-item:hover { opacity: 0.75; }
    .icon-wrap { width: 36px; height: 36px; background: rgba(138,155,196,0.1); border: 1px solid rgba(138,155,196,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-wrap svg { width: 16px; height: 16px; stroke: #8a9bc4; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .contact-label { font-size: 10px; font-weight: 600; color: #8a9bc4; text-transform: uppercase; letter-spacing: 0.1em; }
    .contact-value { font-size: 14px; font-weight: 400; color: #dce3f0; margin-top: 1px; }
    .address-block { padding: 0 36px 24px; }
    .address-text { font-size: 12px; color: rgba(138,155,196,0.55); line-height: 1.5; }
    .card-bottom { background: rgba(0,0,0,0.25); border-top: 1px solid rgba(138,155,196,0.1); padding: 22px 36px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .qr-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .qr-wrap { background: white; padding: 10px; border-radius: 12px; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; }
    .qr-wrap img { width: 76px; height: 76px; }
    .qr-label { font-size: 9px; color: #8a9bc4; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; text-align: center; }
    .save-btn { flex: 1; background: linear-gradient(135deg, #8a9bc4 0%, #c0cadc 100%); color: #0d1526; border: none; border-radius: 14px; padding: 14px 20px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; text-align: center; text-decoration: none; display: block; transition: opacity 0.2s, transform 0.1s; }
    .save-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .save-sub { font-size: 10px; font-weight: 500; opacity: 0.65; display: block; margin-top: 3px; letter-spacing: 0.02em; }
  </style>
</head>
